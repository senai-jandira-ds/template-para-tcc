openapi: 3.0.3
info:
 title: Family Sync
 description: API destinada para a gestão de um aplicativo de gerenciamento familia, com as Funcionalidades, Gerenciamento usuario, familia, listas, etc
 termsOfService: http://swagger.io/terms/
 contact:
   email: gustavodepaulasilva299@gmail.com
 license:
   name: Apache 2.0
   url: http://www.apache.org/licenses/LICENSE-2.0.html
 version: 1.0.0
externalDocs:
 description: Find out more about Swagger
 url: http://swagger.io
servers:
- url: http://localhost:8080


tags:
  - name: Usuarios
    description: Gestão de Usuarios
  - name: Familias
    description: Gestão de Familias
  - name: Eventos
    description: Gestão de Evento
  - name: Enderecos
    description: Gestão de Enderecos
  - name: Notificacoes
    description: Gestão de Notificacões
  - name: Informacoes
    description: Gestão de Informacoes
  
