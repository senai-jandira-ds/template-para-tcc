# ===================
# Componentes
# ===================

components:

   # ===================
   # Parametros
   # ===================
  
 parameters:
   idUrl:
     name: id
     in: path
     description: id unico do banco de dados usado para fazer a requisição de um valor unico
     required: true
     schema:
       type: integer
       format: int64
       example: 6
      
 schemas:


   # ===================
   # Usuarios
   # ===================


   usuarios:
     type: object
     properties:
       Data:
         type: string
       CriadorAPI:
         type: string
       Version:
         type: integer
       StatusCode:
         type: integer
       # --------
       # Response
       # --------
       Response:
         type: array
         items:
           type: object
           properties:
             id_usuario:
               type: integer
             nome:
               type: string
             cpf:
               type: string
             data_nascimento:
               type: string
             senha:
               type: string
             email:
               type: string
             is_admin:
               type: boolean
             familia:
               type: object
               properties:
                 id_familia:
                   type: integer
                 nome:
                   type: string
                 telefone_residencial:
                   type: string
   usuario:
     type: object
     properties:
       Data:
         type: string
       CriadorAPI:
         type: string
       Version:
         type: integer
       StatusCode:
         type: integer
       # --------
       # Response
       # --------
       Response:
         type: object
         properties:
           id_usuario:
             type: integer
           nome:
             type: string
           cpf:
             type: string
           data_nascimento:
             type: string
           senha:
             type: string
           email:
             type: string
           is_admin:
             type: boolean
           familia:
             type: object
             properties:
               id_familia:
                 type: integer
               nome:
                 type: string
               telefone_residencial:
                 type: string


   usuariosFamilia:
     type: object
     properties:
       Data:
         type: string
       CriadorAPI:
         type: string
       Version:
         type: integer
       StatusCode:
         type: integer
       # --------
       # Response
       # --------
       Response:
         type: object
         properties:
           id_familia:
             type: integer
           nome:
             type: string
           telefone_residencial:
             type: string
           usuarios:
             type: array
             items:
               type: object
               properties:
                 id_usuario:
                   type: integer
                 nome:
                   type: string
                 cpf:
                   type: string
                 data_nascimento:
                   type: string
                 senha:
                   type: string
                 email:
                   type: string
                 is_admin:
                   type: boolean


   # ===================
   # Familias
   # ===================


   familias:
     type: object
     properties:
       Data:
         type: string
       CriadorAPI:
         type: string
       Version:
         type: integer
       StatusCode:
         type: integer
       # --------
       # Response
       # --------
       Response:
         type: array
         items:
           type: object
           properties:
             id_familia:
               type: integer
             nome:
               type: string
             telefone_residencial:
               type: string
             endereco:
               type: object
               properties:
                 id_endereco:
                   type: integer
                 cep:
                   type: integer
                 logradouro:
                   type: string
                 bairro:
                   type: string
                 numero:
                   type: integer

   usuariosFamiliaEndereco:
     type: object
     properties:
       Data:
         type: string
